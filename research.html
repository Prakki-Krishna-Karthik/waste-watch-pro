<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteWatch Pro - Research Collaboration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Research Page Styles */
        .research-container {
            padding: 20px;
        }

        /* Header Stats */
        .research-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-box .number {
            font-size: 28px;
            font-weight: 700;
            color: #2196f3;
        }

        .stat-box .label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        /* Tabs */
        .research-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #2196f3;
            border-bottom: 2px solid #2196f3;
        }

        /* Create Post Section */
        .create-post {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .create-post h3 {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .create-post input, .create-post textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .create-post textarea {
            resize: vertical;
            min-height: 100px;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-primary {
            background: #2196f3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-outline {
            background: white;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Research Cards */
        .research-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .card-meta i {
            margin-right: 5px;
        }

        .card-content {
            padding: 20px;
            border-bottom: 1px solid #eee;
            line-height: 1.6;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 20px;
            padding: 12px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stat-item:hover {
            color: #2196f3;
        }

        .stat-item i {
            font-size: 16px;
        }

        .stat-count {
            font-weight: 600;
        }

        /* Comments Section */
        .comments-section {
            padding: 20px;
            background: #fafafa;
            display: none;
        }

        .comments-section.show {
            display: block;
        }

        .comment {
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .comment-text {
            font-size: 14px;
            color: #444;
        }

        .comment-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .add-comment {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .add-comment input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .add-comment button {
            padding: 10px 20px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Peer Review Badge */
        .review-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 10px;
        }

        .review-pending {
            background: #fff3e0;
            color: #ef6c00;
        }

        .review-approved {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .review-rejected {
            background: #ffebee;
            color: #c62828;
        }

        /* Peer Review Modal */
        .review-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .review-modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
        }

        .review-modal-content select, 
        .review-modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">WW</div>
                <h2>WasteWatch Pro</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
                <a href="heatmap.html"><i class="fas fa-fire"></i> Heat Map</a>
                <a href="recommendations.html"><i class="fas fa-check-circle"></i> Use First</a>
                <a href="checklist.html"><i class="fas fa-clipboard-list"></i> Checklist</a>
                <a href="research.html" class="active"><i class="fas fa-flask"></i> Research</a>
                <a href="payroll.html"><i class="fas fa-rupee-sign"></i> Payroll</a>
                <a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="research-container">
                <h1><i class="fas fa-flask"></i> Medical Research Collaboration</h1>

                <!-- Stats Overview -->
                <div class="research-stats">
                    <div class="stat-box">
                        <div class="number" id="totalPapers">0</div>
                        <div class="label">Total Papers</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="totalCitations">0</div>
                        <div class="label">Total Citations</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="activeResearchers">0</div>
                        <div class="label">Active Researchers</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="peerReviews">0</div>
                        <div class="label">Peer Reviews</div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="research-tabs">
                    <button class="tab-btn active" onclick="showTab('papers')"><i class="fas fa-newspaper"></i> All Papers</button>
                    <button class="tab-btn" onclick="showTab('myPapers')"><i class="fas fa-user-edit"></i> My Papers</button>
                    <button class="tab-btn" onclick="showTab('peerReview')"><i class="fas fa-check-double"></i> Pending Reviews</button>
                    <button class="tab-btn" onclick="showTab('collaborators')"><i class="fas fa-users"></i> Collaborators</button>
                </div>

                <!-- Create New Post -->
                <div class="create-post">
                    <h3><i class="fas fa-plus-circle"></i> Share Research</h3>
                    <input type="text" id="paperTitle" placeholder="Research Title">
                    <textarea id="paperAbstract" placeholder="Abstract / Research Summary..."></textarea>
                    <div class="post-actions">
                        <button class="btn-outline" onclick="clearForm()">Clear</button>
                        <button class="btn-primary" onclick="createResearch()"><i class="fas fa-paper-plane"></i> Publish Research</button>
                    </div>
                </div>

                <!-- Research Papers List -->
                <div id="papersList"></div>
                <div id="myPapersList" style="display: none;"></div>
                <div id="peerReviewList" style="display: none;"></div>
                <div id="collaboratorsList" style="display: none;"></div>
            </div>
        </main>
    </div>

    <!-- Peer Review Modal -->
    <div id="reviewModal" class="review-modal">
        <div class="review-modal-content">
            <h3>Peer Review</h3>
            <select id="reviewDecision">
                <option value="approved">✅ Approve</option>
                <option value="revision">🔄 Request Revisions</option>
                <option value="rejected">❌ Reject</option>
            </select>
            <textarea id="reviewComments" rows="4" placeholder="Enter your review comments..."></textarea>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="closeReviewModal()" class="btn-outline">Cancel</button>
                <button onclick="submitReview()" class="btn-primary">Submit Review</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Sample Research Data
        let researchPapers = [
            {
                id: '1',
                title: 'New Study on Amoxicillin Efficacy in Respiratory Infections',
                content: 'This comprehensive study analyzed 500 patients over 6 months. Results showed 94% effectiveness with extended course...',
                author: 'Dr. Sarah Wilson',
                authorId: 'DOC001',
                department: 'Cardiology',
                date: '2026-04-10',
                views: 245,
                likes: 32,
                citations: 12,
                comments: [
                    { author: 'Dr. James Chen', text: 'Excellent methodology! Have you considered pediatric trials?', date: '2026-04-11' }
                ],
                reviewStatus: 'approved',
                reviewComments: 'Well-researched paper. Recommended for publication.'
            },
            {
                id: '2',
                title: 'Insulin Storage Best Practices: Temperature Impact Study',
                content: 'Research on insulin stability across different temperature ranges. Findings suggest optimal storage at 2-8°C extends shelf life by 30%...',
                author: 'Dr. James Chen',
                authorId: 'DOC002',
                department: 'Endocrinology',
                date: '2026-04-05',
                views: 189,
                likes: 45,
                citations: 8,
                comments: [
                    { author: 'Dr. Sarah Wilson', text: 'Important findings for our pharmacy!', date: '2026-04-06' },
                    { author: 'Dr. Priya Sharma', text: 'Would love to see this implemented hospital-wide.', date: '2026-04-07' }
                ],
                reviewStatus: 'pending',
                reviewComments: ''
            },
            {
                id: '3',
                title: 'Antibiotic Resistance Trends in ICU Patients (2025-2026)',
                content: 'Analysis of 1,200 ICU patients showing concerning 15% increase in resistant strains. Urgent need for stewardship programs...',
                author: 'Dr. Priya Sharma',
                authorId: 'DOC003',
                department: 'ICU',
                date: '2026-04-01',
                views: 567,
                likes: 89,
                citations: 24,
                comments: [
                    { author: 'Dr. Sarah Wilson', text: 'Critical findings for our hospital!', date: '2026-04-02' }
                ],
                reviewStatus: 'approved',
                reviewComments: 'Groundbreaking research. Must read for all ICU staff.'
            }
        ];

        let currentUser = { id: 'DOC001', name: 'Dr. Sarah Wilson', role: 'doctor' };
        let currentTab = 'papers';

        function showTab(tabName) {
            currentTab = tabName;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Show/hide sections
            document.getElementById('papersList').style.display = tabName === 'papers' ? 'block' : 'none';
            document.getElementById('myPapersList').style.display = tabName === 'myPapers' ? 'block' : 'none';
            document.getElementById('peerReviewList').style.display = tabName === 'peerReview' ? 'block' : 'none';
            document.getElementById('collaboratorsList').style.display = tabName === 'collaborators' ? 'block' : 'none';
            
            // Load respective data
            if (tabName === 'papers') displayAllPapers();
            if (tabName === 'myPapers') displayMyPapers();
            if (tabName === 'peerReview') displayPeerReview();
            if (tabName === 'collaborators') displayCollaborators();
        }

        function displayAllPapers() {
            const container = document.getElementById('papersList');
            updateStats();
            
            container.innerHTML = researchPapers.map(paper => `
                <div class="research-card">
                    <div class="card-header">
                        <div class="card-title">
                            ${paper.title}
                            ${paper.reviewStatus === 'approved' ? '<span class="review-badge review-approved"><i class="fas fa-check-circle"></i> Peer Reviewed</span>' : 
                              paper.reviewStatus === 'pending' ? '<span class="review-badge review-pending"><i class="fas fa-clock"></i> Pending Review</span>' : ''}
                        </div>
                        <div class="card-meta">
                            <span><i class="fas fa-user-md"></i> ${paper.author} (${paper.department})</span>
                            <span><i class="fas fa-calendar"></i> ${paper.date}</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <p>${paper.content.substring(0, 200)}${paper.content.length > 200 ? '...' : ''}</p>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item" onclick="toggleComments('${paper.id}')">
                            <i class="fas fa-comment"></i> <span class="stat-count">${paper.comments.length}</span> Comments
                        </div>
                        <div class="stat-item" onclick="citePaper('${paper.id}')">
                            <i class="fas fa-quote-right"></i> <span class="stat-count">${paper.citations}</span> Citations
                        </div>
                        <div class="stat-item" onclick="likePaper('${paper.id}')">
                            <i class="fas fa-thumbs-up"></i> <span class="stat-count">${paper.likes}</span> Likes
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-eye"></i> <span class="stat-count">${paper.views}</span> Views
                        </div>
                        ${currentUser.role === 'doctor' && paper.authorId !== currentUser.id && paper.reviewStatus === 'pending' ? `
                        <div class="stat-item" onclick="openReviewModal('${paper.id}')" style="color: #ff8800;">
                            <i class="fas fa-clipboard-list"></i> Peer Review
                        </div>
                        ` : ''}
                    </div>
                    <div id="comments-${paper.id}" class="comments-section">
                        ${paper.comments.map(c => `
                            <div class="comment">
                                <div class="comment-author">${c.author}</div>
                                <div class="comment-text">${c.text}</div>
                                <div class="comment-time">${c.date}</div>
                            </div>
                        `).join('')}
                        <div class="add-comment">
                            <input type="text" id="comment-input-${paper.id}" placeholder="Add a comment...">
                            <button onclick="addComment('${paper.id}')">Post</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayMyPapers() {
            const myPapers = researchPapers.filter(p => p.authorId === currentUser.id);
            const container = document.getElementById('myPapersList');
            
            if (myPapers.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-file-alt" style="font-size: 48px;"></i><h3>No papers yet</h3><p>Share your research to get started!</p></div>';
                return;
            }
            
            container.innerHTML = myPapers.map(paper => `
                <div class="research-card">
                    <div class="card-header">
                        <div class="card-title">${paper.title}</div>
                        <div class="card-meta">
                            <span><i class="fas fa-calendar"></i> ${paper.date}</span>
                            <span><i class="fas fa-eye"></i> ${paper.views} views</span>
                            <span><i class="fas fa-quote-right"></i> ${paper.citations} citations</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <p>${paper.content.substring(0, 200)}...</p>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <i class="fas fa-check-circle"></i> Status: ${paper.reviewStatus === 'approved' ? '✅ Approved' : paper.reviewStatus === 'pending' ? '⏳ Pending Review' : '❌ Needs Revision'}
                        </div>
                        ${paper.reviewComments ? `<div class="stat-item"><i class="fas fa-comment-dots"></i> Review: ${paper.reviewComments}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function displayPeerReview() {
            const pendingReviews = researchPapers.filter(p => p.reviewStatus === 'pending' && p.authorId !== currentUser.id);
            const container = document.getElementById('peerReviewList');
            
            if (pendingReviews.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle" style="font-size: 48px; color: #00C851;"></i><h3>No pending reviews</h3><p>All caught up! Check back later.</p></div>';
                return;
            }
            
            container.innerHTML = pendingReviews.map(paper => `
                <div class="research-card">
                    <div class="card-header">
                        <div class="card-title">${paper.title}</div>
                        <div class="card-meta">
                            <span><i class="fas fa-user-md"></i> ${paper.author}</span>
                            <span><i class="fas fa-calendar"></i> ${paper.date}</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <p>${paper.content.substring(0, 200)}...</p>
                    </div>
                    <div class="stats-row">
                        <button class="btn-primary" onclick="openReviewModal('${paper.id}')" style="width: 100%;">
                            <i class="fas fa-clipboard-list"></i> Review This Paper
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function displayCollaborators() {
            const collaborators = [
                { name: 'Dr. James Chen', specialty: 'Endocrinology', institution: 'City Medical Center', papers: 5, collaborations: 3 },
                { name: 'Dr. Priya Sharma', specialty: 'ICU Medicine', institution: 'University Hospital', papers: 8, collaborations: 4 },
                { name: 'Dr. Michael Lee', specialty: 'Pharmacology', institution: 'Research Institute', papers: 12, collaborations: 7 }
            ];
            
            const container = document.getElementById('collaboratorsList');
            container.innerHTML = `
                <div class="research-card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-users"></i> Suggested Collaborators</div>
                    </div>
                    ${collaborators.map(c => `
                        <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>${c.name}</strong>
                                <div style="font-size: 13px; color: #666;">${c.specialty} | ${c.institution}</div>
                                <div style="font-size: 12px; margin-top: 5px;">📄 ${c.papers} papers | 🤝 ${c.collaborations} collaborations</div>
                            </div>
                            <button class="btn-primary" onclick="alert('Collaboration request sent to ${c.name}!')" style="padding: 8px 16px;">
                                <i class="fas fa-handshake"></i> Connect
                            </button>
                        </div>
                    `).join('')}
                </div>
                <div class="research-card" style="margin-top: 20px;">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-chart-line"></i> Collaboration Impact</div>
                    </div>
                    <div style="padding: 20px; text-align: center;">
                        <div style="font-size: 36px; font-weight: 700; color: #2196f3;">${researchPapers.reduce((sum, p) => sum + p.citations, 0)}</div>
                        <div style="color: #666;">Total Citations from Collaborative Research</div>
                        <div style="margin-top: 20px; font-size: 14px;">⭐ Your research is making an impact!</div>
                    </div>
                </div>
            `;
        }

        function updateStats() {
            document.getElementById('totalPapers').textContent = researchPapers.length;
            document.getElementById('totalCitations').textContent = researchPapers.reduce((sum, p) => sum + p.citations, 0);
            document.getElementById('activeResearchers').textContent = [...new Set(researchPapers.map(p => p.authorId))].length;
            document.getElementById('peerReviews').textContent = researchPapers.filter(p => p.reviewStatus !== 'pending').length;
        }

        function toggleComments(paperId) {
            const commentsDiv = document.getElementById(`comments-${paperId}`);
            commentsDiv.classList.toggle('show');
        }

        function addComment(paperId) {
            const input = document.getElementById(`comment-input-${paperId}`);
            const comment = input.value.trim();
            if (!comment) return;
            
            const paper = researchPapers.find(p => p.id === paperId);
            paper.comments.push({
                author: currentUser.name,
                text: comment,
                date: new Date().toISOString().split('T')[0]
            });
            
            input.value = '';
            displayAllPapers();
        }

        function likePaper(paperId) {
            const paper = researchPapers.find(p => p.id === paperId);
            paper.likes++;
            displayAllPapers();
        }

        function citePaper(paperId) {
            const paper = researchPapers.find(p => p.id === paperId);
            paper.citations++;
            displayAllPapers();
            alert(`📝 You cited "${paper.title}"\n\nAPA Citation:\n${paper.author} (${paper.date.split('-')[0]}). ${paper.title}. WasteWatch Research.`);
        }

        let currentReviewId = null;

        function openReviewModal(paperId) {
            currentReviewId = paperId;
            document.getElementById('reviewModal').style.display = 'flex';
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
            currentReviewId = null;
        }

        function submitReview() {
            const decision = document.getElementById('reviewDecision').value;
            const comments = document.getElementById('reviewComments').value;
            
            const paper = researchPapers.find(p => p.id === currentReviewId);
            paper.reviewStatus = decision === 'approved' ? 'approved' : decision === 'revision' ? 'revision' : 'rejected';
            paper.reviewComments = comments;
            
            closeReviewModal();
            displayAllPapers();
            alert(`✅ Review submitted! Decision: ${decision}`);
        }

        function createResearch() {
            const title = document.getElementById('paperTitle').value;
            const content = document.getElementById('paperAbstract').value;
            
            if (!title || !content) {
                alert('Please enter both title and abstract');
                return;
            }
            
            const newPaper = {
                id: (researchPapers.length + 1).toString(),
                title: title,
                content: content,
                author: currentUser.name,
                authorId: currentUser.id,
                department: 'Research Department',
                date: new Date().toISOString().split('T')[0],
                views: 0,
                likes: 0,
                citations: 0,
                comments: [],
                reviewStatus: 'pending',
                reviewComments: ''
            };
            
            researchPapers.unshift(newPaper);
            clearForm();
            displayAllPapers();
            alert('✅ Research published successfully!');
        }

        function clearForm() {
            document.getElementById('paperTitle').value = '';
            document.getElementById('paperAbstract').value = '';
        }
