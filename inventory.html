<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteWatch Pro - Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .add-btn {
            background: #00C851;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .inventory-table {
            background: white;
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .status-critical { background: #ffebee; color: #c62828; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-high { background: #fff3e0; color: #ef6c00; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-low { background: #e8f5e8; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .edit-btn, .delete-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 4px;
        }
        .edit-btn { background: #e3f2fd; color: #1976d2; }
        .delete-btn { background: #ffebee; color: #c62828; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .search-input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">WW</div>
                <h2>WasteWatch Pro</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="inventory.html" class="active"><i class="fas fa-boxes"></i> Inventory</a>
                <a href="heatmap.html"><i class="fas fa-fire"></i> Heat Map</a>
                <a href="recommendations.html"><i class="fas fa-check-circle"></i> Use First</a>
                <a href="checklist.html"><i class="fas fa-clipboard-list"></i> Checklist</a>
                <a href="research.html"><i class="fas fa-flask"></i> Research</a>
                <a href="payroll.html"><i class="fas fa-rupee-sign"></i> Payroll</a>
                <a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="inventory-header">
                <h1>Inventory Management</h1>
                <button class="add-btn" onclick="showAddModal()"><i class="fas fa-plus"></i> Add New Batch</button>
            </div>
            
            <div style="margin-bottom: 20px;">
                <input type="text" id="searchInput" class="search-input" placeholder="Search medicine...">
                <button onclick="searchInventory()" style="padding: 10px 20px; background: #2196f3; color: white; border: none; border-radius: 8px; cursor: pointer;">Search</button>
            </div>

            <div class="inventory-table">
                <table id="inventoryTable">
                    <thead>
                        <tr><th>Medicine</th><th>Batch</th><th>Quantity</th><th>Expiry Date</th><th>Days Left</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <h2>Add New Batch</h2>
            <input type="text" id="medicineName" placeholder="Medicine Name">
            <input type="text" id="batchNumber" placeholder="Batch Number">
            <input type="number" id="quantity" placeholder="Quantity">
            <input type="number" id="price" placeholder="Price (₹)">
            <input type="date" id="expiryDate" placeholder="Expiry Date">
            <input type="text" id="supplier" placeholder="Supplier">
            <button onclick="saveBatch()" style="background: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 8px;">Save</button>
            <button onclick="closeModal()" style="padding: 10px 20px;">Cancel</button>
        </div>
    </div>

    <script src="js/api.js"></script>
<script>
    let inventoryData = [];
    
    async function loadInventory() {
        try {
            const batches = await API.get('/inventory/batches');
            inventoryData = batches;
            displayInventory(batches);
        } catch(e) { 
            console.error(e);
            // Fallback to mock data if API fails
            loadMockInventory();
        }
    }
    
    function loadMockInventory() {
        const today = new Date();
        const mockData = [
            { medicineName: 'Amoxicillin', batchNumber: 'AMX001', quantity: 500, price: 5.00, 
              expiryDate: new Date(today.getTime() + 15*24*60*60*1000).toISOString(), supplier: 'MediSupply' },
            { medicineName: 'Amoxicillin', batchNumber: 'AMX002', quantity: 800, price: 5.00, 
              expiryDate: new Date(today.getTime() + 45*24*60*60*1000).toISOString(), supplier: 'MediSupply' },
            { medicineName: 'Paracetamol', batchNumber: 'PAR001', quantity: 1000, price: 2.50, 
              expiryDate: new Date(today.getTime() + 10*24*60*60*1000).toISOString(), supplier: 'HealthCorp' },
            { medicineName: 'Insulin', batchNumber: 'INS001', quantity: 200, price: 15.00, 
              expiryDate: new Date(today.getTime() + 20*24*60*60*1000).toISOString(), supplier: 'PharmaCorp' }
        ];
        
        const processed = mockData.map(b => {
            const expiry = new Date(b.expiryDate);
            const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
            let status = daysLeft <= 30 ? 'CRITICAL' : (daysLeft <= 60 ? 'HIGH' : 'LOW');
            return { ...b, daysLeft, status, _id: Math.random().toString() };
        });
        displayInventory(processed);
    }
    
    function displayInventory(data) {
        const tbody = document.getElementById('inventoryBody');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">No inventory found</td></tr>';
            return;
        }
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        tbody.innerHTML = data.map(item => {
            // Calculate days left from expiry date
            let daysLeft = item.daysLeft;
            if (!daysLeft && item.expiryDate) {
                const expiry = new Date(item.expiryDate);
                daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                daysLeft = Math.max(0, daysLeft);
            }
            
            // Determine status based on days left
            let status = '';
            let statusClass = '';
            if (daysLeft <= 30) {
                status = 'CRITICAL';
                statusClass = 'status-critical';
            } else if (daysLeft <= 60) {
                status = 'HIGH';
                statusClass = 'status-high';
            } else if (daysLeft <= 90) {
                status = 'MEDIUM';
                statusClass = 'status-medium';
            } else {
                status = 'LOW';
                statusClass = 'status-low';
            }
            
            // Format expiry date
            let expiryDateStr = '-';
            if (item.expiryDate) {
                const expiry = new Date(item.expiryDate);
                expiryDateStr = expiry.toLocaleDateString('en-GB');
            }
            
            return `<tr>
                <td><strong>${item.medicineName || 'Medicine'}</strong></td>
                <td>${item.batchNumber || '-'}</td>
                <td>${item.quantity || 0}</td>
                <td>${expiryDateStr}</td>
                <td><strong>${daysLeft}</strong></td>
                <td><span class="${statusClass}">${status}</span></td>
                <td>
                    <button class="edit-btn" onclick="editBatch('${item._id}')"><i class="fas fa-edit"></i></button>
                    <button class="delete-btn" onclick="deleteBatch('${item._id}')"><i class="fas fa-trash"></i></button>
                 </td>
            </tr>`;
        }).join('');
    }
    
    function searchInventory() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = inventoryData.filter(item => 
            (item.medicineName || '').toLowerCase().includes(term) ||
            (item.batchNumber || '').toLowerCase().includes(term)
        );
        displayInventory(filtered);
    }
    
    function showAddModal() {
        document.getElementById('inventoryModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('inventoryModal').style.display = 'none';
    }
    
    async function saveBatch() {
        const expiryDate = new Date(document.getElementById('expiryDate').value);
        const data = {
            medicineName: document.getElementById('medicineName').value,
            batchNumber: document.getElementById('batchNumber').value,
            quantity: parseInt(document.getElementById('quantity').value),
            price: parseFloat(document.getElementById('price').value),
            expiryDate: expiryDate.toISOString(),
            supplier: document.getElementById('supplier').value
        };
        await API.post('/inventory/batches', data);
        closeModal();
        loadInventory();
        alert('Batch added!');
    }
    
    async function deleteBatch(id) {
        if (confirm('Delete this batch?')) {
            await API.delete(`/inventory/batches/${id}`);
            loadInventory();
        }
    }
    
    function editBatch(id) { alert('Edit feature coming soon'); }
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    
    loadInventory();
</script>
</body>
</html>
