<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteWatch Pro - Expiry Heat Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .heatmap-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-critical { border-left-color: #ff4444; }
        .card-high { border-left-color: #ff8800; }
        .card-medium { border-left-color: #ffbb33; }
        .card-low { border-left-color: #00C851; }
        .medicine-name { font-size: 18px; font-weight: 600; }
        .batch-number { font-size: 12px; color: #666; margin-top: 4px; }
        .expiry-days { font-size: 24px; font-weight: 700; margin: 10px 0; }
        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill { height: 100%; transition: width 0.3s; }
        .stats { display: flex; gap: 10px; margin: 10px 0; }
        .stat { flex: 1; text-align: center; padding: 8px; background: #f8f9fa; border-radius: 8px; }
        .recommendation { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 8px; font-size: 13px; }
        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .filter-select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">WW</div>
                <h2>WasteWatch Pro</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
                <a href="heatmap.html" class="active"><i class="fas fa-fire"></i> Heat Map</a>
                <a href="recommendations.html"><i class="fas fa-check-circle"></i> Use First</a>
                <a href="checklist.html"><i class="fas fa-clipboard-list"></i> Checklist</a>
                <a href="research.html"><i class="fas fa-flask"></i> Research</a>
                <a href="payroll.html"><i class="fas fa-rupee-sign"></i> Payroll</a>
                <a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <h1>Expiry Heat Map</h1>
            
            <div class="filter-section">
                <select id="riskFilter" class="filter-select" onchange="applyFilters()">
                    <option value="all">All Risks</option>
                    <option value="CRITICAL">Critical (0-30 days)</option>
                    <option value="HIGH">High (31-60 days)</option>
                    <option value="MEDIUM">Medium (61-90 days)</option>
                    <option value="LOW">Low (90+ days)</option>
                </select>
                <div class="legend" style="display: flex; gap: 15px; margin-left: auto;">
                    <span><span style="background:#ff4444; width:12px; height:12px; display:inline-block;"></span> Critical</span>
                    <span><span style="background:#ff8800; width:12px; height:12px; display:inline-block;"></span> High</span>
                    <span><span style="background:#ffbb33; width:12px; height:12px; display:inline-block;"></span> Medium</span>
                    <span><span style="background:#00C851; width:12px; height:12px; display:inline-block;"></span> Low</span>
                </div>
            </div>

            <div id="heatmapContainer" class="heatmap-grid"></div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        let heatmapData = [];
        
        async function loadHeatmap() {
            try {
                const batches = await API.get('/inventory/expiring?days=365');
                heatmapData = batches.map(b => {
                    const daysLeft = b.daysLeft || 0;
                    let risk = daysLeft <= 30 ? 'CRITICAL' : (daysLeft <= 60 ? 'HIGH' : (daysLeft <= 90 ? 'MEDIUM' : 'LOW'));
                    let color = risk === 'CRITICAL' ? '#ff4444' : (risk === 'HIGH' ? '#ff8800' : (risk === 'MEDIUM' ? '#ffbb33' : '#00C851'));
                    let progress = Math.min(100, (daysLeft / 365) * 100);
                    return { ...b, daysLeft, risk, color, progress };
                });
                displayHeatmap(heatmapData);
            } catch(e) { console.error(e); }
        }
        
        function displayHeatmap(data) {
            const container = document.getElementById('heatmapContainer');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="loading">No data available</div>';
                return;
            }
            
            container.innerHTML = data.map(item => `
                <div class="heatmap-card card-${item.risk.toLowerCase()}">
                    <div class="medicine-name">${item.medicineName || 'Medicine'}</div>
                    <div class="batch-number">Batch: ${item.batchNumber || '-'} | ${item.supplier || 'Unknown'}</div>
                    <div class="expiry-days" style="color: ${item.color}">${item.daysLeft} days left</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${item.progress}%; background: ${item.color}"></div></div>
                    <div class="stats">
                        <div class="stat"><div>Stock</div><div><strong>${item.quantity || 0}</strong></div></div>
                        <div class="stat"><div>Expires</div><div><strong>${item.expiryDate ? new Date(item.expiryDate).toLocaleDateString() : '-'}</strong></div></div>
                    </div>
                    <div class="recommendation">${item.daysLeft <= 30 ? '⚠️ Use immediately! This medicine is expiring soon.' : '✅ Stock is safe for now.'}</div>
                </div>
            `).join('');
        }
        
        function applyFilters() {
            const risk = document.getElementById('riskFilter').value;
            if (risk === 'all') displayHeatmap(heatmapData);
            else displayHeatmap(heatmapData.filter(item => item.risk === risk));
        }
        
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        
        loadHeatmap();
    </script>
</body>
</html>
