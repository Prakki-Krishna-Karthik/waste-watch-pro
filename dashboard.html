<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteWatch Pro - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Additional dashboard-specific styles */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 28px;
        }

        .stat-icon.blue { background: #e3f2fd; color: #1976d2; }
        .stat-icon.red { background: #ffebee; color: #c62828; }
        .stat-icon.green { background: #e8f5e8; color: #2e7d32; }
        .stat-icon.orange { background: #fff3e0; color: #ef6c00; }

        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-info p {
            color: #666;
            font-size: 14px;
        }

        .alerts-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .alerts-section h3 {
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alerts-section h3 i {
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">WW</div>
                <h2>WasteWatch Pro</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
                <a href="heatmap.html"><i class="fas fa-fire"></i> Heat Map</a>
                <a href="recommendations.html"><i class="fas fa-check-circle"></i> Use First</a>
                <a href="checklist.html"><i class="fas fa-clipboard-list"></i> Checklist</a>
                <a href="research.html"><i class="fas fa-flask"></i> Research</a>
                <a href="payroll.html"><i class="fas fa-rupee-sign"></i> Payroll</a>
                <a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Dashboard</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName"></span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-boxes"></i></div>
                    <div class="stat-info">
                        <h3 id="totalBatches">0</h3>
                        <p>Total Batches</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="stat-info">
                        <h3 id="criticalBatches">0</h3>
                        <p>Critical Items</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-rupee-sign"></i></div>
                    <div class="stat-info">
                        <h3 id="totalSavings">₹0</h3>
                        <p>Total Savings</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3 id="totalStaff">0</h3>
                        <p>Total Staff</p>
                    </div>
                </div>
            </div>

            <div class="alerts-section">
                <h3><i class="fas fa-bell"></i> Critical Alerts</h3>
                <div id="alertsList"></div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
<script>
    async function loadDashboard() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').textContent = user.fullName || 'User';
        
        try {
            const batches = await API.get('/inventory/batches');
            
            // Calculate days left properly
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const batchesWithDays = batches.map(b => {
                let daysLeft = 0;
                if (b.expiryDate) {
                    const expiry = new Date(b.expiryDate);
                    daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                    daysLeft = Math.max(0, daysLeft);
                }
                return { ...b, daysLeft };
            });
            
            const totalBatches = batchesWithDays.length;
            const criticalBatches = batchesWithDays.filter(b => b.daysLeft <= 30).length;
            const savings = 15000;
            const staffCount = 12;
            
            document.getElementById('totalBatches').textContent = totalBatches;
            document.getElementById('criticalBatches').textContent = criticalBatches;
            document.getElementById('totalSavings').textContent = '₹' + savings.toLocaleString();
            document.getElementById('totalStaff').textContent = staffCount;
            
            // Show only critical items (days left <= 30)
            const criticalItems = batchesWithDays.filter(b => b.daysLeft <= 30);
            
            const alertsHtml = criticalItems.map(batch => `
                <div class="alert-item">
                    <div class="alert-content">
                        <div class="alert-title">${batch.medicineName || 'Medicine'} - Batch ${batch.batchNumber || 'N/A'}</div>
                        <div class="alert-detail">
                            <i class="fas fa-calendar"></i> Expires in ${batch.daysLeft} days | 
                            <i class="fas fa-box"></i> ${batch.quantity || 0} units left
                        </div>
                    </div>
                    <button class="use-first-btn" onclick="markAsUsed('${batch._id}')">
                        <i class="fas fa-check-circle"></i> Use First
                    </button>
                </div>
            `).join('');
            
            document.getElementById('alertsList').innerHTML = alertsHtml || '<div class="alert-item">No critical alerts</div>';
            
        } catch (error) {
            console.error('Error loading dashboard:', error);
            document.getElementById('alertsList').innerHTML = '<div class="alert-item">Error loading alerts</div>';
        }
    }
    
    async function markAsUsed(batchId) {
        if (confirm('Mark this batch as used?')) {
            try {
                await API.delete(`/inventory/batches/${batchId}`);
                const used = JSON.parse(localStorage.getItem('usedBatches') || '[]');
                used.push(batchId);
                localStorage.setItem('usedBatches', JSON.stringify(used));
                alert('✅ Batch marked as used!');
                loadDashboard();
            } catch (error) {
                console.error('Error marking as used:', error);
                alert('Error marking batch. Please try again.');
            }
        }
    }
    
    function logout() { 
        localStorage.clear(); 
        window.location.href = 'login.html'; 
    }
    
    loadDashboard();
</script>
</body>
</html>
